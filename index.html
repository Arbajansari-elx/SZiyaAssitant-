<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Elx Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Figtree',sans-serif;color:#fff;user-select:none;}

.bg{position:fixed;inset:0;z-index:0;background:#070a14;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(100px);animation:bm 16s ease-in-out infinite;}
.blob:nth-child(1){width:580px;height:580px;background:radial-gradient(circle,rgba(20,60,180,0.38),transparent 70%);top:-140px;left:-140px;animation-delay:0s;}
.blob:nth-child(2){width:460px;height:460px;background:radial-gradient(circle,rgba(50,130,255,0.2),transparent 70%);bottom:-110px;right:-110px;animation-delay:-6s;}
.blob:nth-child(3){width:340px;height:340px;background:radial-gradient(circle,rgba(0,200,255,0.12),transparent 70%);top:42%;left:32%;animation-delay:-11s;}
@keyframes bm{0%,100%{transform:translate(0,0) scale(1);}40%{transform:translate(55px,40px) scale(1.1);}75%{transform:translate(-28px,60px) scale(0.93);}}

.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.7s cubic-bezier(.4,0,.2,1),transform 0.7s cubic-bezier(.4,0,.2,1);}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.96) translateY(14px);}

/* ─── WELCOME ─── */
.w-orb{width:152px;height:152px;border-radius:50%;margin-bottom:48px;position:relative;overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,0.22) 0%,rgba(100,180,255,0.12) 35%,rgba(55,120,255,0.06) 65%,rgba(0,215,255,0.1) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.27);
  box-shadow:0 0 60px rgba(55,140,255,0.42),0 0 120px rgba(55,140,255,0.18),inset 0 2px 0 rgba(255,255,255,0.44),inset 0 -1px 0 rgba(55,140,255,0.16);
  animation:fy 5.5s ease-in-out infinite,ogp 3.8s ease-in-out infinite;}
@keyframes fy{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes ogp{0%,100%{box-shadow:0 0 60px rgba(55,140,255,0.42),0 0 120px rgba(55,140,255,0.18),inset 0 2px 0 rgba(255,255,255,0.44);}50%{box-shadow:0 0 85px rgba(55,140,255,0.6),0 0 170px rgba(55,140,255,0.28),inset 0 2px 0 rgba(255,255,255,0.56);}}
.os{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 180deg at 40% 40%,rgba(255,255,255,0.55) 0deg,rgba(120,200,255,0.28) 70deg,transparent 130deg,rgba(0,228,255,0.18) 208deg,rgba(255,255,255,0.07) 286deg,rgba(255,255,255,0.45) 360deg);opacity:0.55;animation:sw 9s linear infinite;}
@keyframes sw{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.oh{position:absolute;top:20px;left:26px;width:44px;height:33px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.64),transparent 70%);transform:rotate(-25deg);}
.oh2{position:absolute;bottom:24px;right:22px;width:17px;height:13px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.38),transparent 70%);}

.wt{font-family:'Instrument Serif',serif;font-size:clamp(1.9rem,7vw,2.7rem);font-weight:400;text-align:center;line-height:1.2;margin-bottom:12px;background:linear-gradient(180deg,#fff 25%,rgba(165,210,255,0.82) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ws{font-size:0.83rem;color:rgba(255,255,255,0.3);text-align:center;margin-bottom:52px;font-weight:300;letter-spacing:0.06em;}
.wb2{position:absolute;bottom:28px;font-size:0.6rem;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.2);}

.gbtn{padding:15px 52px;border-radius:100px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:0.94rem;font-weight:600;color:#fff;letter-spacing:0.04em;position:relative;overflow:hidden;transition:all 0.25s cubic-bezier(.34,1.56,.64,1);
  background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.05) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.24);
  box-shadow:0 8px 30px rgba(0,0,0,0.22),inset 0 1px 0 rgba(255,255,255,0.38),0 0 28px rgba(55,140,255,0.2);}
.gbtn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.13),transparent);transition:left 0.4s;}
.gbtn:hover{transform:scale(1.05) translateY(-1px);box-shadow:0 12px 40px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.5),0 0 50px rgba(55,140,255,0.32);}
.gbtn:hover::before{left:100%;}
.gbtn:active{transform:scale(0.97);}

/* ─── NAME ─── */
.nc{width:min(345px,90vw);padding:36px 26px;border-radius:28px;display:flex;flex-direction:column;align-items:center;gap:20px;
  background:linear-gradient(145deg,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.03) 100%);
  backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 20px 60px rgba(0,0,0,0.42),inset 0 1px 0 rgba(255,255,255,0.17);}
.nl{font-size:0.64rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.28);}
.nh{font-family:'Instrument Serif',serif;font-size:clamp(1.55rem,5vw,1.95rem);text-align:center;font-weight:400;color:rgba(255,255,255,0.9);}
.ni{width:100%;padding:14px 18px;border-radius:14px;color:#fff;font-family:'Figtree',sans-serif;font-size:1rem;outline:none;text-align:center;letter-spacing:0.06em;font-weight:400;transition:all 0.3s;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.07);}
.ni::placeholder{color:rgba(255,255,255,0.2);}
.ni:focus{border-color:rgba(55,140,255,0.6);background:rgba(55,140,255,0.08);box-shadow:0 0 0 4px rgba(55,140,255,0.1),inset 0 1px 0 rgba(255,255,255,0.1);}
.nb{width:100%;padding:14px;border-radius:100px;border:none;font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;color:#fff;cursor:pointer;opacity:0.35;pointer-events:none;transition:all 0.3s;
  background:linear-gradient(135deg,rgba(55,140,255,0.72),rgba(18,58,160,0.72));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(55,140,255,0.38);
  box-shadow:0 0 28px rgba(55,140,255,0.18),inset 0 1px 0 rgba(255,255,255,0.2);}
.nb.ready{opacity:1;pointer-events:all;}
.nb.ready:hover{transform:scale(1.02);box-shadow:0 0 50px rgba(55,140,255,0.35),inset 0 1px 0 rgba(255,255,255,0.28);}

/* ─── MAIN ─── */
#s3{justify-content:flex-start;}

.tb{width:100%;display:flex;align-items:center;justify-content:space-between;padding:50px 22px 0;flex-shrink:0;}
.tl{font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.22);}
.sp{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.28);
  background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);box-shadow:inset 0 1px 0 rgba(255,255,255,0.09);}
.sd{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.22);transition:all 0.35s;}
.sd.L{background:#4aff8c;box-shadow:0 0 8px #4aff8c;animation:dp 1s infinite;}
.sd.T{background:#ffd04a;box-shadow:0 0 8px #ffd04a;animation:dp 0.45s infinite;}
.sd.S{background:#4a9eff;box-shadow:0 0 8px #4a9eff;animation:dp 0.7s infinite;}
@keyframes dp{0%,100%{opacity:1}50%{opacity:0.15}}

/* Orb */
.ow{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:20px;}
.mo{width:142px;height:142px;border-radius:50%;position:relative;overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,0.2) 0%,rgba(110,185,255,0.11) 35%,rgba(55,120,255,0.06) 65%,rgba(0,215,255,0.1) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.25);
  box-shadow:0 0 50px rgba(55,140,255,0.28),0 0 100px rgba(55,140,255,0.1),inset 0 2px 0 rgba(255,255,255,0.42),inset 0 -1px 0 rgba(55,140,255,0.13);
  animation:fy 5.5s ease-in-out infinite;
  transition:border-color 0.5s,box-shadow 0.5s;}

/* Orb states */
.mo.L{border-color:rgba(74,255,140,0.5);box-shadow:0 0 65px rgba(74,255,140,0.45),0 0 130px rgba(74,255,140,0.18),inset 0 2px 0 rgba(255,255,255,0.5);}
.mo.T{border-color:rgba(255,210,74,0.42);box-shadow:0 0 55px rgba(255,210,74,0.35),0 0 110px rgba(255,210,74,0.13),inset 0 2px 0 rgba(255,255,255,0.44);}
.mo.S{border-color:rgba(74,158,255,0.58);box-shadow:0 0 72px rgba(74,158,255,0.52),0 0 144px rgba(74,158,255,0.2),inset 0 2px 0 rgba(255,255,255,0.5);}

/* Orb inner ring animation for speaking */
.mo.S .mos{animation:sw 1.8s linear infinite;}
.mo.L .mos{animation:sw 2.8s linear infinite;}

.mos{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 180deg at 40% 40%,rgba(255,255,255,0.52) 0deg,rgba(120,200,255,0.26) 72deg,transparent 128deg,rgba(0,228,255,0.16) 208deg,rgba(255,255,255,0.07) 288deg,rgba(255,255,255,0.42) 360deg);opacity:0.52;animation:sw 10s linear infinite;}
.moh{position:absolute;top:19px;left:25px;width:42px;height:31px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.62),transparent 70%);transform:rotate(-25deg);}
.moh2{position:absolute;bottom:22px;right:20px;width:15px;height:11px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.37),transparent 70%);}

.hn{margin-top:16px;font-size:0.75rem;color:rgba(255,255,255,0.35);letter-spacing:0.06em;font-weight:400;}
.mq{font-family:'Instrument Serif',serif;font-size:clamp(1.3rem,4.8vw,1.75rem);text-align:center;font-weight:400;color:rgba(255,255,255,0.88);line-height:1.3;padding:6px 26px 0;min-height:52px;transition:opacity 0.3s;}

/* Chat */
.chat{flex:1;width:100%;overflow-y:auto;padding:12px 14px 4px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:0;}
.cb{max-width:80%;padding:10px 14px;border-radius:18px;font-size:0.84rem;line-height:1.62;animation:cbi 0.3s ease;font-weight:400;position:relative;overflow:hidden;}
@keyframes cbi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 55%);pointer-events:none;}
.cb.u{align-self:flex-end;border-bottom-right-radius:5px;background:linear-gradient(135deg,rgba(55,140,255,0.22),rgba(55,140,255,0.08));border:1px solid rgba(55,140,255,0.26);box-shadow:0 4px 16px rgba(55,140,255,0.1),inset 0 1px 0 rgba(255,255,255,0.13);}
.cb.a{align-self:flex-start;border-bottom-left-radius:5px;background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.03));border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 16px rgba(0,0,0,0.13),inset 0 1px 0 rgba(255,255,255,0.09);}
.cbr{font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px;opacity:0.38;font-weight:600;}
.cb.u .cbr{color:#7ec8ff;}
.cb.a .cbr{color:rgba(255,255,255,0.48);}

/* Bottom — Gemini style */
.btm{width:100%;padding:8px 14px 30px;flex-shrink:0;}

/* The big orb-ring mic indicator — Gemini style */
.gemini-bar{
  width:100%;
  display:flex;align-items:center;justify-content:center;
  gap:14px;
  padding:14px 20px;
  border-radius:100px;
  position:relative;overflow:hidden;
  transition:all 0.4s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.03) 100%);
  backdrop-filter:blur(30px) saturate(200%);-webkit-backdrop-filter:blur(30px) saturate(200%);
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 8px 30px rgba(0,0,0,0.24),inset 0 1px 0 rgba(255,255,255,0.18),inset 0 -1px 0 rgba(255,255,255,0.03);}
.gemini-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.05),transparent);pointer-events:none;border-radius:100px 100px 0 0;}
.gemini-bar.L{border-color:rgba(74,255,140,0.38);box-shadow:0 8px 30px rgba(74,255,140,0.1),0 0 0 2px rgba(74,255,140,0.06),inset 0 1px 0 rgba(255,255,255,0.24);background:linear-gradient(135deg,rgba(74,255,140,0.09) 0%,rgba(74,255,140,0.02) 100%);}
.gemini-bar.S{border-color:rgba(74,158,255,0.44);box-shadow:0 8px 30px rgba(74,158,255,0.13),0 0 0 2px rgba(74,158,255,0.06),inset 0 1px 0 rgba(255,255,255,0.24);background:linear-gradient(135deg,rgba(74,158,255,0.11) 0%,rgba(74,158,255,0.03) 100%);}
.gemini-bar.T{border-color:rgba(255,200,74,0.26);background:linear-gradient(135deg,rgba(255,200,74,0.07) 0%,rgba(255,200,74,0.02) 100%);}

/* Sound wave — Gemini style bars */
.gwave{display:flex;align-items:center;gap:4px;height:28px;flex:1;justify-content:center;}
.gw{width:3px;border-radius:10px;background:rgba(255,255,255,0.15);height:4px;transition:background 0.3s;}
.gemini-bar.L .gw{background:rgba(74,255,140,0.8);}
.gemini-bar.S .gw{background:rgba(74,158,255,0.88);}
.gemini-bar.T .gw{background:rgba(255,200,74,0.65);}
.gw:nth-child(1){animation:gwa 1.2s ease-in-out infinite 0s;}
.gw:nth-child(2){animation:gwa 1.2s ease-in-out infinite 0.1s;}
.gw:nth-child(3){animation:gwa 1.2s ease-in-out infinite 0.2s;}
.gw:nth-child(4){animation:gwa 1.2s ease-in-out infinite 0.3s;}
.gw:nth-child(5){animation:gwa 1.2s ease-in-out infinite 0.2s;}
.gw:nth-child(6){animation:gwa 1.2s ease-in-out infinite 0.1s;}
.gw:nth-child(7){animation:gwa 1.2s ease-in-out infinite 0s;}
.gw:nth-child(8){animation:gwa 1.2s ease-in-out infinite 0.08s;}
.gw:nth-child(9){animation:gwa 1.2s ease-in-out infinite 0.18s;}
.gw:nth-child(10){animation:gwa 1.2s ease-in-out infinite 0.25s;}
.gw:nth-child(11){animation:gwa 1.2s ease-in-out infinite 0.15s;}
.gw:nth-child(12){animation:gwa 1.2s ease-in-out infinite 0.05s;}
@keyframes gwa{0%,100%{height:4px;opacity:0.2}50%{height:24px;opacity:1}}

.g-label{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.25);font-weight:400;flex-shrink:0;min-width:60px;text-align:right;}
.gemini-bar.L .g-label{color:rgba(74,255,140,0.7);}
.gemini-bar.S .g-label{color:rgba(74,158,255,0.8);}
.gemini-bar.T .g-label{color:rgba(255,200,74,0.7);}

/* Stop button — only shows while speaking */
.stop-btn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  font-size:0.75rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;font-weight:700;letter-spacing:0.05em;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.5);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.14);}
.stop-btn:hover{background:rgba(255,80,80,0.18);border-color:rgba(255,80,80,0.38);color:rgba(255,120,120,0.9);}

.ex-row{display:flex;justify-content:center;gap:14px;margin-top:10px;}
.ex{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:rgba(255,255,255,0.26);
  background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);}
.ex:hover{background:rgba(55,140,255,0.12);border-color:rgba(55,140,255,0.26);color:rgba(100,180,255,0.9);}
.ex.on{background:rgba(55,140,255,0.14);border-color:rgba(55,140,255,0.36);color:#7ec8ff;}

/* Overlay */
.ov{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;padding:48px 18px 30px;opacity:0;pointer-events:none;transition:opacity 0.3s;
  background:rgba(4,6,16,0.9);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);}
.ov.open{opacity:1;pointer-events:all;}
.ovt{font-size:0.63rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.26);margin-bottom:18px;}
.ovx{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.09);color:rgba(255,255,255,0.32);cursor:pointer;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:0.88rem;}
.hl{width:100%;max-width:520px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1;}
.hl::-webkit-scrollbar{width:0;}
.hi{padding:11px 14px;border-radius:14px;font-size:0.8rem;line-height:1.55;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);box-shadow:inset 0 1px 0 rgba(255,255,255,0.07);}
.hi .hr{font-size:0.55rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px;opacity:0.36;}
.hi.u .hr{color:#7ec8ff;}
.hi.a .hr{color:rgba(255,255,255,0.42);}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:100px;font-size:0.72rem;color:#7ec8ff;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;white-space:nowrap;
  background:rgba(4,10,36,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(55,140,255,0.2);box-shadow:inset 0 1px 0 rgba(255,255,255,0.09);}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="bg"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>

<!-- WELCOME -->
<div class="screen" id="s1">
  <div class="w-orb"><div class="os"></div><div class="oh"></div><div class="oh2"></div></div>
  <div class="wt">Your Personal<br/>AI Assistant</div>
  <div class="ws">Powered by Elx Intelligence</div>
  <button class="gbtn" onclick="goName()">Get Started</button>
  <div class="wb2">Elx · Voice AI</div>
</div>

<!-- NAME -->
<div class="screen hidden" id="s2">
  <div class="nc">
    <div class="nl">Welcome</div>
    <div class="nh">What's your<br/>name?</div>
    <input class="ni" id="nIn" type="text" placeholder="Enter your name" autocomplete="off" spellcheck="false"
      oninput="onNIn()" onkeydown="if(event.key==='Enter')goMain()"/>
    <button class="nb" id="nBtn" onclick="goMain()">Continue →</button>
  </div>
</div>

<!-- MAIN -->
<div class="screen hidden" id="s3">
  <div class="tb">
    <div class="tl">Elx · AI</div>
    <div class="sp"><div class="sd" id="sd"></div><span id="st">Ready</span></div>
  </div>

  <div class="ow">
    <div class="mo" id="orb">
      <div class="mos"></div><div class="moh"></div><div class="moh2"></div>
    </div>
    <div class="hn" id="hn">Hello</div>
    <div class="mq" id="mq">How can I help<br/>you today?</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="btm">
    <!-- Gemini-style wave bar -->
    <div class="gemini-bar" id="gbar">
      <div class="gwave">
        <div class="gw"></div><div class="gw"></div><div class="gw"></div>
        <div class="gw"></div><div class="gw"></div><div class="gw"></div>
        <div class="gw"></div><div class="gw"></div><div class="gw"></div>
        <div class="gw"></div><div class="gw"></div><div class="gw"></div>
      </div>
      <div class="g-label" id="glbl">Listening</div>
      <button class="stop-btn" id="stopBtn" onclick="stopSpeech()" style="display:none">■</button>
    </div>
    <div class="ex-row">
      <button class="ex" id="muteBtn" onclick="toggleMute()">🔊</button>
      <button class="ex" onclick="openHist()">📋</button>
      <button class="ex" onclick="clearAll()">🗑️</button>
    </div>
  </div>
</div>

<!-- History -->
<div class="ov" id="hist">
  <div class="ovt">History</div>
  <button class="ovx" onclick="closeHist()">✕</button>
  <div class="hl" id="hl"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
//  NAV
// ══════════════════════════════════════
let uName = localStorage.getItem('elx_name') || '';

function show(id, v) { document.getElementById(id).classList.toggle('hidden', !v); }

function goName() {
  show('s1', false); show('s2', true);
  setTimeout(() => document.getElementById('nIn').focus(), 500);
}
function onNIn() {
  document.getElementById('nBtn').classList.toggle('ready', document.getElementById('nIn').value.trim().length > 0);
}
function goMain() {
  const v = document.getElementById('nIn').value.trim();
  if (!v) return;
  uName = v; localStorage.setItem('elx_name', uName);
  show('s2', false); show('s3', true);
  initMain();
}

window.addEventListener('load', () => {
  if (uName) { show('s1', false); show('s3', true); initMain(); }
});

function initMain() {
  document.getElementById('hn').textContent = 'Hello ' + uName;
  loadPrevChat();
  // Start after brief delay
  setTimeout(beginListening, 900);
}

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let isMuted = false, isSpeaking = false, isProcessing = false;
let mediaStream = null;        // keep mic stream alive — no beep!
let recognition = null;
let silenceTimer = null;
let convHistory = JSON.parse(localStorage.getItem('elx_ctx') || '[]').slice(-14);
let currentAudio = null;
const VOICE_ID = '21m00Tcm4TlvDq8ikWAM';

// ══════════════════════════════════════
//  MIC STREAM — acquire once, keep alive
//  This prevents the on/off beep sound
// ══════════════════════════════════════
async function acquireMic() {
  if (mediaStream) return true;
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    return true;
  } catch(e) {
    showToast('Mic permission do browser mein');
    return false;
  }
}

// ══════════════════════════════════════
//  ALWAYS-ON LISTEN
// ══════════════════════════════════════
async function beginListening() {
  const ok = await acquireMic();
  if (!ok) return;
  startRecognition();
}

function startRecognition() {
  // HARD BLOCK — never start mic when AI is speaking or processing
  if (isSpeaking || isProcessing) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Chrome use karo!'); return; }

  // Kill old instance cleanly — remove all handlers first
  if (recognition) {
    recognition.onstart = null;
    recognition.onresult = null;
    recognition.onerror = null;
    recognition.onend = null;
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }

  // Small delay to let previous instance fully die
  setTimeout(() => {
    // Check again after delay — state may have changed
    if (isSpeaking || isProcessing) return;

    const rec = new SR();
    rec.lang = 'hi-IN';
    rec.continuous = false;
    rec.interimResults = true;
    rec.maxAlternatives = 1;

    let finalText = '';
    recognition = rec;

    rec.onstart = () => {
      setBar('L');
      setStatus('L', 'Listening');
      document.getElementById('orb').className = 'mo L';
      document.getElementById('mq').textContent = 'Sun raha hoon...';
      document.getElementById('glbl').textContent = 'Listening';
      finalText = '';
    };

    rec.onresult = (e) => {
      if (isSpeaking || isProcessing) return; // safety check
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      if (interim || finalText) {
        document.getElementById('glbl').textContent = interim || finalText;
      }
      clearTimeout(silenceTimer);
      if (finalText.trim()) {
        silenceTimer = setTimeout(() => {
          const t = finalText.trim();
          finalText = '';
          if (t && !isProcessing && !isSpeaking) {
            silentStop();
            processInput(t);
          }
        }, 1500);
      }
    };

    rec.onerror = (e) => {
      const ignore = ['aborted','no-speech','network','audio-capture'];
      if (!ignore.includes(e.error)) showToast('Mic: ' + e.error);
      scheduleRestart(e.error === 'network' ? 2500 : 800);
    };

    rec.onend = () => {
      // Only restart if truly idle
      if (!isSpeaking && !isProcessing) {
        scheduleRestart(500);
      }
    };

    try { rec.start(); } catch(e) { scheduleRestart(1000); }

  }, 150);
}

function silentStop() {
  clearTimeout(silenceTimer);
  if (recognition) {
    recognition.onend = null;
    recognition.onerror = null;
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
}

let restartT = null;
function scheduleRestart(ms = 400) {
  clearTimeout(restartT);
  if (isSpeaking || isProcessing) return;
  restartT = setTimeout(startRecognition, ms);
}

// ══════════════════════════════════════
//  PROCESS → AI
// ══════════════════════════════════════
async function processInput(text) {
  if (!text || isProcessing) return;
  isProcessing = true;

  addBubble('u', text);
  setBar('T');
  setStatus('T', 'Thinking...');
  document.getElementById('orb').className = 'mo T';
  document.getElementById('mq').textContent = 'Soch raha hoon...';
  document.getElementById('glbl').textContent = 'Thinking...';

  const sys = `Tu "Elx" hai — ek smart friendly AI voice assistant. User ka naam "${uName}" hai. Tu Hinglish mein baat karta hai (natural Hindi + English mix). Sirf 1-2 chhoti sentences mein reply karo — voice ke liye optimize. Koi markdown, asterisks, emojis ya special characters mat use karo. Plain natural conversational speech only.`;

  convHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: convHistory, systemPrompt: sys })
    });
    if (!res.ok) throw new Error(res.status);
    const { reply } = await res.json();
    convHistory.push({ role: 'assistant', content: reply });
    localStorage.setItem('elx_ctx', JSON.stringify(convHistory.slice(-24)));
    addBubble('a', reply);
    document.getElementById('mq').textContent = reply;
    if (!isMuted) await speakReply(reply);
    else afterDone();
  } catch(e) {
    showToast('Error — API check karo');
    afterDone();
  }
}

// ══════════════════════════════════════
//  TTS
// ══════════════════════════════════════
async function speakReply(text) {
  isSpeaking = true;
  setBar('S');
  setStatus('S', 'Speaking');
  document.getElementById('orb').className = 'mo S';
  document.getElementById('glbl').textContent = 'Speaking...';
  document.getElementById('stopBtn').style.display = 'flex';

  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voiceId: VOICE_ID })
    });
    if (!res.ok) throw new Error('tts');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); afterDone(); };
    currentAudio.onerror = () => fallbackTTS(text);
    currentAudio.play();
  } catch(e) { fallbackTTS(text); }
}

function fallbackTTS(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'hi-IN'; u.rate = 0.95;
  const hv = speechSynthesis.getVoices().find(v => v.lang.startsWith('hi'));
  if (hv) u.voice = hv;
  u.onend = afterDone;
  speechSynthesis.speak(u);
}

function stopSpeech() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
  afterDone();
}

function afterDone() {
  isSpeaking = false;
  isProcessing = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('mq').textContent = 'How can I help\nyou today?';
  setBar('');
  setStatus('', 'Ready');
  document.getElementById('orb').className = 'mo';
  document.getElementById('glbl').textContent = 'Listening';
  clearTimeout(restartT);
  restartT = setTimeout(startRecognition, 1200);
}

// ══════════════════════════════════════
//  UI
// ══════════════════════════════════════
function setBar(state) {
  const b = document.getElementById('gbar');
  b.className = 'gemini-bar';
  if (state) b.classList.add(state);
}

function setStatus(cls, label) {
  const d = document.getElementById('sd'), t = document.getElementById('st');
  d.className = 'sd'; if(cls) d.classList.add(cls);
  t.textContent = label;
}

function addBubble(role, text) {
  const area = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'cb ' + role;
  d.innerHTML = `<div class="cbr">${role==='u'?uName:'Elx AI'}</div>${text}`;
  area.appendChild(d);
  d.scrollIntoView({behavior:'smooth',block:'nearest'});
  while(area.children.length > 12) area.removeChild(area.firstChild);
}

function loadPrevChat() {
  convHistory.slice(-4).forEach(h => addBubble(h.role==='user'?'u':'a', h.content));
}

function toggleMute() {
  isMuted = !isMuted;
  const b = document.getElementById('muteBtn');
  b.textContent = isMuted ? '🔇' : '🔊';
  b.classList.toggle('on', isMuted);
  if (isMuted) stopSpeech();
}

function clearAll() {
  convHistory = []; localStorage.removeItem('elx_ctx');
  document.getElementById('chat').innerHTML = '';
  document.getElementById('mq').textContent = 'How can I help\nyou today?';
  showToast('Chat clear ✓');
}

function openHist() {
  const ctx = JSON.parse(localStorage.getItem('elx_ctx')||'[]');
  document.getElementById('hl').innerHTML = !ctx.length
    ? '<div style="color:rgba(255,255,255,0.2);text-align:center;padding:40px;font-size:0.8rem">Koi history nahi</div>'
    : ctx.slice().reverse().map(h=>`<div class="hi ${h.role==='user'?'u':'a'}"><div class="hr">${h.role==='user'?uName:'Elx AI'}</div>${h.content}</div>`).join('');
  document.getElementById('hist').classList.add('open');
}
function closeHist() { document.getElementById('hist').classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
</body>
</html>

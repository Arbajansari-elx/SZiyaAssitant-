<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Elx Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Figtree',sans-serif;color:#fff;user-select:none;}

/* ── BG ── */
.bg{position:fixed;inset:0;z-index:0;background:#080c18;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(90px);animation:blobM 14s ease-in-out infinite;}
.blob:nth-child(1){width:520px;height:520px;background:radial-gradient(circle,rgba(25,70,190,0.4),transparent 70%);top:-120px;left:-120px;animation-delay:0s;}
.blob:nth-child(2){width:420px;height:420px;background:radial-gradient(circle,rgba(60,140,255,0.22),transparent 70%);bottom:-100px;right:-100px;animation-delay:-5s;}
.blob:nth-child(3){width:320px;height:320px;background:radial-gradient(circle,rgba(0,210,255,0.13),transparent 70%);top:45%;left:35%;animation-delay:-9s;}
@keyframes blobM{0%,100%{transform:translate(0,0) scale(1);}40%{transform:translate(50px,35px) scale(1.12);}70%{transform:translate(-25px,55px) scale(0.94);}}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.65s cubic-bezier(.4,0,.2,1),transform 0.65s cubic-bezier(.4,0,.2,1);}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.96) translateY(12px);}

/* ════ SCREEN 1 — WELCOME ════ */
.w-orb{width:148px;height:148px;border-radius:50%;margin-bottom:46px;position:relative;overflow:hidden;animation:floatY 5s ease-in-out infinite;
  background:linear-gradient(145deg,rgba(255,255,255,0.22) 0%,rgba(100,180,255,0.13) 35%,rgba(60,130,255,0.07) 65%,rgba(0,220,255,0.11) 100%);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1.5px solid rgba(255,255,255,0.28);
  box-shadow:0 0 55px rgba(60,140,255,0.4),0 0 110px rgba(60,140,255,0.18),inset 0 2px 0 rgba(255,255,255,0.45),inset 0 -1px 0 rgba(60,140,255,0.18);
  animation:floatY 5s ease-in-out infinite, orbGlowP 3.5s ease-in-out infinite;
}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
@keyframes orbGlowP{0%,100%{box-shadow:0 0 55px rgba(60,140,255,0.4),0 0 110px rgba(60,140,255,0.18),inset 0 2px 0 rgba(255,255,255,0.45);}50%{box-shadow:0 0 80px rgba(60,140,255,0.58),0 0 160px rgba(60,140,255,0.28),inset 0 2px 0 rgba(255,255,255,0.55);}}
.w-orb-swirl{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 180deg at 40% 40%,rgba(255,255,255,0.55) 0deg,rgba(120,200,255,0.28) 70deg,transparent 130deg,rgba(0,230,255,0.18) 210deg,rgba(255,255,255,0.08) 290deg,rgba(255,255,255,0.45) 360deg);opacity:0.55;animation:swirl 9s linear infinite;}
@keyframes swirl{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.w-orb-hl{position:absolute;top:20px;left:26px;width:44px;height:33px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.65),transparent 70%);transform:rotate(-25deg);}
.w-orb-hl2{position:absolute;bottom:24px;right:22px;width:17px;height:13px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.4),transparent 70%);}

.w-title{font-family:'Instrument Serif',serif;font-size:clamp(2rem,7vw,2.8rem);font-weight:400;text-align:center;line-height:1.2;margin-bottom:12px;background:linear-gradient(180deg,#fff 30%,rgba(170,210,255,0.82) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.w-sub{font-size:0.84rem;color:rgba(255,255,255,0.32);text-align:center;margin-bottom:50px;font-weight:300;letter-spacing:0.06em;}

.btn-glass{padding:15px 50px;border-radius:100px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:0.95rem;font-weight:600;color:#fff;letter-spacing:0.04em;position:relative;overflow:hidden;transition:all 0.25s cubic-bezier(.34,1.56,.64,1);
  background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.05) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.24);
  box-shadow:0 8px 32px rgba(0,0,0,0.22),inset 0 1px 0 rgba(255,255,255,0.38),0 0 28px rgba(60,140,255,0.2);}
.btn-glass::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent);transition:left 0.4s;}
.btn-glass:hover{transform:scale(1.05) translateY(-1px);box-shadow:0 12px 40px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.5),0 0 50px rgba(60,140,255,0.32);}
.btn-glass:hover::before{left:100%;}
.btn-glass:active{transform:scale(0.97);}

.w-brand{position:absolute;bottom:28px;font-size:0.6rem;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.22);}

/* ════ SCREEN 2 — NAME ════ */
.name-card{width:min(350px,90vw);padding:36px 26px;border-radius:28px;display:flex;flex-direction:column;align-items:center;gap:20px;
  background:linear-gradient(145deg,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.03) 100%);
  backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 20px 60px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.18);}
.n-label{font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.n-title{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,5vw,2rem);text-align:center;font-weight:400;color:rgba(255,255,255,0.9);}
.n-input{width:100%;padding:14px 18px;border-radius:14px;color:#fff;font-family:'Figtree',sans-serif;font-size:1rem;outline:none;text-align:center;letter-spacing:0.06em;font-weight:400;transition:all 0.3s;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);}
.n-input::placeholder{color:rgba(255,255,255,0.2);}
.n-input:focus{border-color:rgba(60,140,255,0.6);background:rgba(60,140,255,0.08);box-shadow:0 0 0 4px rgba(60,140,255,0.1),inset 0 1px 0 rgba(255,255,255,0.12);}
.n-btn{width:100%;padding:14px;border-radius:100px;border:none;font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;color:#fff;cursor:pointer;opacity:0.35;pointer-events:none;transition:all 0.3s;
  background:linear-gradient(135deg,rgba(60,140,255,0.72),rgba(20,60,160,0.72));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(60,140,255,0.38);
  box-shadow:0 0 28px rgba(60,140,255,0.18),inset 0 1px 0 rgba(255,255,255,0.22);}
.n-btn.ready{opacity:1;pointer-events:all;}
.n-btn.ready:hover{transform:scale(1.02);box-shadow:0 0 50px rgba(60,140,255,0.35),inset 0 1px 0 rgba(255,255,255,0.28);}

/* ════ SCREEN 3 — MAIN ════ */
#s-main{justify-content:flex-start;padding:0;}

.top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:50px 22px 0;flex-shrink:0;}
.top-logo{font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.25);}
.s-pill{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.09);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);}
.sd{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all 0.35s;}
.sd.listening{background:#4aff8c;box-shadow:0 0 8px #4aff8c;animation:sd 1s infinite;}
.sd.thinking{background:#ffd04a;box-shadow:0 0 8px #ffd04a;animation:sd 0.45s infinite;}
.sd.speaking{background:#4a9eff;box-shadow:0 0 8px #4a9eff;animation:sd 0.7s infinite;}
@keyframes sd{0%,100%{opacity:1}50%{opacity:0.15}}

/* Main orb */
.orb-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:22px;}
.m-orb{width:138px;height:138px;border-radius:50%;position:relative;overflow:hidden;transition:box-shadow 0.4s,border-color 0.4s;animation:floatY 5s ease-in-out infinite;
  background:linear-gradient(145deg,rgba(255,255,255,0.2) 0%,rgba(110,185,255,0.11) 35%,rgba(60,120,255,0.06) 65%,rgba(0,215,255,0.1) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.26);
  box-shadow:0 0 50px rgba(60,140,255,0.28),0 0 100px rgba(60,140,255,0.1),inset 0 2px 0 rgba(255,255,255,0.42),inset 0 -1px 0 rgba(60,140,255,0.14);}
.m-orb.listening{border-color:rgba(74,255,140,0.5);box-shadow:0 0 65px rgba(74,255,140,0.45),0 0 130px rgba(74,255,140,0.18),inset 0 2px 0 rgba(255,255,255,0.5);animation:floatY 5s ease-in-out infinite,orbPulse 0.9s ease-in-out infinite;}
.m-orb.thinking{border-color:rgba(255,210,74,0.45);box-shadow:0 0 55px rgba(255,210,74,0.35),0 0 110px rgba(255,210,74,0.14),inset 0 2px 0 rgba(255,255,255,0.45);}
.m-orb.speaking{border-color:rgba(74,158,255,0.6);box-shadow:0 0 72px rgba(74,158,255,0.55),0 0 144px rgba(74,158,255,0.22),inset 0 2px 0 rgba(255,255,255,0.52);animation:floatY 5s ease-in-out infinite,orbSpeak 1.1s ease-in-out infinite;}
@keyframes orbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes orbSpeak{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.04) translateY(-5px)}}
.m-orb-swirl{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 180deg at 40% 40%,rgba(255,255,255,0.52) 0deg,rgba(120,200,255,0.26) 72deg,transparent 128deg,rgba(0,228,255,0.16) 208deg,rgba(255,255,255,0.07) 288deg,rgba(255,255,255,0.42) 360deg);opacity:0.52;animation:swirl 10s linear infinite;}
.m-orb.listening .m-orb-swirl{animation-duration:2.5s;}
.m-orb.speaking .m-orb-swirl{animation-duration:1.8s;}
.m-orb-hl{position:absolute;top:19px;left:25px;width:40px;height:30px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.62),transparent 70%);transform:rotate(-25deg);}
.m-orb-hl2{position:absolute;bottom:22px;right:20px;width:15px;height:11px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.38),transparent 70%);}

.hi-name{margin-top:16px;font-size:0.76rem;color:rgba(255,255,255,0.38);letter-spacing:0.06em;font-weight:400;}
.main-q{font-family:'Instrument Serif',serif;font-size:clamp(1.35rem,5vw,1.8rem);text-align:center;font-weight:400;color:rgba(255,255,255,0.9);line-height:1.3;padding:6px 26px 0;min-height:54px;transition:opacity 0.3s;}

/* Chat */
.chat{flex:1;width:100%;overflow-y:auto;padding:12px 14px 4px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:0;}
.cb{max-width:80%;padding:10px 14px;border-radius:18px;font-size:0.84rem;line-height:1.62;animation:cbIn 0.3s ease;font-weight:400;position:relative;overflow:hidden;}
@keyframes cbIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 55%);pointer-events:none;}
.cb.u{align-self:flex-end;border-bottom-right-radius:5px;background:linear-gradient(135deg,rgba(60,140,255,0.22),rgba(60,140,255,0.08));border:1px solid rgba(60,140,255,0.28);box-shadow:0 4px 16px rgba(60,140,255,0.1),inset 0 1px 0 rgba(255,255,255,0.14);}
.cb.a{align-self:flex-start;border-bottom-left-radius:5px;background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.03));border:1px solid rgba(255,255,255,0.11);box-shadow:0 4px 16px rgba(0,0,0,0.14),inset 0 1px 0 rgba(255,255,255,0.1);}
.cb-r{font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px;opacity:0.4;font-weight:600;}
.cb.u .cb-r{color:#7ec8ff;}
.cb.a .cb-r{color:rgba(255,255,255,0.5);}

/* Bottom */
.btm{width:100%;padding:10px 14px 32px;flex-shrink:0;}
.i-pill{width:100%;display:flex;align-items:center;padding:10px 11px 10px 18px;border-radius:100px;gap:10px;transition:all 0.35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.03) 100%);
  backdrop-filter:blur(30px) saturate(200%);-webkit-backdrop-filter:blur(30px) saturate(200%);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 8px 30px rgba(0,0,0,0.24),inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(255,255,255,0.04);}
.i-pill::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.055),transparent);pointer-events:none;border-radius:100px 100px 0 0;}
.i-pill.listening{border-color:rgba(74,255,140,0.42);box-shadow:0 8px 30px rgba(74,255,140,0.1),0 0 0 3px rgba(74,255,140,0.06),inset 0 1px 0 rgba(255,255,255,0.28);background:linear-gradient(135deg,rgba(74,255,140,0.1) 0%,rgba(74,255,140,0.03) 100%);}
.i-pill.speaking{border-color:rgba(74,158,255,0.48);box-shadow:0 8px 30px rgba(74,158,255,0.14),0 0 0 3px rgba(74,158,255,0.07),inset 0 1px 0 rgba(255,255,255,0.28);background:linear-gradient(135deg,rgba(74,158,255,0.12) 0%,rgba(74,158,255,0.03) 100%);}
.i-pill.thinking{border-color:rgba(255,200,74,0.28);background:linear-gradient(135deg,rgba(255,200,74,0.07) 0%,rgba(255,200,74,0.02) 100%);}
.i-txt{flex:1;font-size:0.87rem;color:rgba(255,255,255,0.38);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:300;letter-spacing:0.01em;}

/* Wave bars */
.wbs{display:flex;align-items:center;gap:3px;height:22px;flex-shrink:0;}
.wb{width:3px;border-radius:10px;background:rgba(255,255,255,0.18);height:3px;transition:background 0.3s;}
.i-pill.listening .wb{background:rgba(74,255,140,0.85);}
.i-pill.speaking .wb{background:rgba(74,158,255,0.9);}
.i-pill.thinking .wb{background:rgba(255,200,74,0.7);}
.wb:nth-child(1){animation:wba 1.1s ease-in-out infinite 0s;}
.wb:nth-child(2){animation:wba 1.1s ease-in-out infinite 0.11s;}
.wb:nth-child(3){animation:wba 1.1s ease-in-out infinite 0.22s;}
.wb:nth-child(4){animation:wba 1.1s ease-in-out infinite 0.15s;}
.wb:nth-child(5){animation:wba 1.1s ease-in-out infinite 0.06s;}
@keyframes wba{0%,100%{height:3px;opacity:0.25}50%{height:20px;opacity:1}}

/* Mic btn */
.mic-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.25s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,0.2),rgba(255,255,255,0.05));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.26);
  box-shadow:0 4px 16px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.38);}
.mic-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.18),transparent);border-radius:50% 50% 0 0;}
.mic-btn:active{transform:scale(0.91);}
.mic-btn.on{background:linear-gradient(145deg,rgba(255,60,60,0.5),rgba(160,20,20,0.4));border-color:rgba(255,80,80,0.5);box-shadow:0 0 28px rgba(255,60,60,0.35),inset 0 1px 0 rgba(255,255,255,0.35);}

/* Extra btns */
.ex-row{display:flex;justify-content:center;gap:14px;margin-top:10px;}
.ex{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:rgba(255,255,255,0.28);
  background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.09);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);}
.ex:hover{background:rgba(60,140,255,0.12);border-color:rgba(60,140,255,0.28);color:rgba(100,180,255,0.9);}
.ex.on{background:rgba(60,140,255,0.14);border-color:rgba(60,140,255,0.38);color:#7ec8ff;}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;padding:48px 18px 30px;opacity:0;pointer-events:none;transition:opacity 0.3s;
  background:rgba(4,7,18,0.88);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);}
.overlay.open{opacity:1;pointer-events:all;}
.ov-t{font-size:0.64rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:18px;}
.ov-x{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);box-shadow:inset 0 1px 0 rgba(255,255,255,0.12);color:rgba(255,255,255,0.35);cursor:pointer;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:0.88rem;}
.hl{width:100%;max-width:520px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1;}
.hl::-webkit-scrollbar{width:0;}
.hi{padding:11px 14px;border-radius:14px;font-size:0.8rem;line-height:1.55;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);box-shadow:inset 0 1px 0 rgba(255,255,255,0.07);}
.hi .hr{font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px;opacity:0.38;}
.hi.u .hr{color:#7ec8ff;}
.hi.a .hr{color:rgba(255,255,255,0.45);}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:100px;font-size:0.72rem;color:#7ec8ff;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;white-space:nowrap;
  background:rgba(4,12,40,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(60,140,255,0.22);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="bg"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>

<!-- SCREEN 1: WELCOME -->
<div class="screen" id="s1">
  <div class="w-orb"><div class="w-orb-swirl"></div><div class="w-orb-hl"></div><div class="w-orb-hl2"></div></div>
  <div class="w-title">Your Personal<br/>AI Assistant</div>
  <div class="w-sub">Powered by Elx Intelligence</div>
  <button class="btn-glass" onclick="goName()">Get Started</button>
  <div class="w-brand">Elx · Voice AI</div>
</div>

<!-- SCREEN 2: NAME -->
<div class="screen hidden" id="s2">
  <div class="name-card">
    <div class="n-label">Welcome</div>
    <div class="n-title">What's your<br/>name?</div>
    <input class="n-input" id="nIn" type="text" placeholder="Enter your name" autocomplete="off" spellcheck="false"
      oninput="onNIn()" onkeydown="if(event.key==='Enter')goMain()"/>
    <button class="n-btn" id="nBtn" onclick="goMain()">Continue →</button>
  </div>
</div>

<!-- SCREEN 3: MAIN -->
<div class="screen hidden" id="s3">
  <div class="top-bar">
    <div class="top-logo">Elx · AI</div>
    <div class="s-pill"><div class="sd" id="sd"></div><span id="st">Ready</span></div>
  </div>

  <div class="orb-wrap">
    <div class="m-orb" id="orb">
      <div class="m-orb-swirl"></div><div class="m-orb-hl"></div><div class="m-orb-hl2"></div>
    </div>
    <div class="hi-name" id="hiName">Hello</div>
    <div class="main-q" id="mq">How can I help<br/>you today?</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="btm">
    <div class="i-pill" id="pill">
      <div class="i-txt" id="itxt">Listening...</div>
      <div class="wbs"><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div></div>
      <button class="mic-btn" id="micBtn" onclick="togglePause()" title="Pause/Resume">🎤</button>
    </div>
    <div class="ex-row">
      <button class="ex" id="muteBtn" onclick="toggleMute()">🔊</button>
      <button class="ex" onclick="openHist()">📋</button>
      <button class="ex" onclick="clearAll()">🗑️</button>
    </div>
  </div>
</div>

<!-- History overlay -->
<div class="overlay" id="hist">
  <div class="ov-t">History</div>
  <button class="ov-x" onclick="closeHist()">✕</button>
  <div class="hl" id="hl"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════
let uName = localStorage.getItem('elx_name') || '';

function show(id, v) { document.getElementById(id).classList.toggle('hidden', !v); }

function goName() {
  show('s1', false); show('s2', true);
  setTimeout(() => document.getElementById('nIn').focus(), 500);
}

function onNIn() {
  const v = document.getElementById('nIn').value.trim();
  document.getElementById('nBtn').classList.toggle('ready', v.length > 0);
}

function goMain() {
  const v = document.getElementById('nIn').value.trim();
  if (!v) return;
  uName = v;
  localStorage.setItem('elx_name', uName);
  show('s2', false); show('s3', true);
  initMain();
}

window.addEventListener('load', () => {
  if (uName) { show('s1', false); show('s3', true); initMain(); }
});

function initMain() {
  document.getElementById('hiName').textContent = 'Hello ' + uName;
  loadHist();
  // Auto-start listening after short delay
  setTimeout(startListen, 800);
}

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let isMuted = false, isSpeaking = false, isPaused = false;
let recognition = null, silenceTimer = null, restartTimer = null;
let convHistory = JSON.parse(localStorage.getItem('elx_ctx') || '[]').slice(-14);
let currentAudio = null;
let isProcessing = false;  // prevent double processing
const VOICE_ID = '21m00Tcm4TlvDq8ikWAM';

// ══════════════════════════════════════
//  ALWAYS-ON LISTEN ENGINE
// ══════════════════════════════════════
function startListen() {
  if (isPaused || isSpeaking || isProcessing) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Chrome use karo bhai!'); return; }

  // Clean up old instance
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }

  recognition = new SR();
  recognition.lang = 'hi-IN';
  recognition.continuous = false;   // false = more stable on mobile
  recognition.interimResults = true;

  let finalText = '';
  let hasStarted = false;

  recognition.onstart = () => {
    hasStarted = true;
    setStatus('listening');
    setPill('listening');
    document.getElementById('orb').className = 'm-orb listening';
    document.getElementById('itxt').textContent = 'Listening...';
    finalText = '';
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }

    const display = interim || finalText;
    if (display) document.getElementById('itxt').textContent = display;

    // Reset silence timer on every result
    clearTimeout(silenceTimer);
    if (finalText.trim()) {
      silenceTimer = setTimeout(() => {
        const t = finalText.trim();
        finalText = '';
        if (t && !isProcessing) {
          stopCurrentRecognition();
          processInput(t);
        }
      }, 1500);
    }
  };

  recognition.onerror = (e) => {
    // Ignore these — they are not real errors
    if (['aborted', 'no-speech', 'network'].includes(e.error)) {
      scheduleRestart(e.error === 'network' ? 2000 : 400);
      return;
    }
    showToast('Mic error: ' + e.error);
    scheduleRestart(1500);
  };

  recognition.onend = () => {
    // Auto restart if not paused/speaking/processing
    if (!isPaused && !isSpeaking && !isProcessing) {
      scheduleRestart(300);
    }
  };

  try {
    recognition.start();
  } catch(e) {
    scheduleRestart(800);
  }
}

function stopCurrentRecognition() {
  clearTimeout(silenceTimer);
  clearTimeout(restartTimer);
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
}

function scheduleRestart(delay = 400) {
  clearTimeout(restartTimer);
  if (isPaused || isSpeaking || isProcessing) return;
  restartTimer = setTimeout(startListen, delay);
}

// Pause/resume mic manually
function togglePause() {
  if (isSpeaking) { stopSpeech(); return; }
  isPaused = !isPaused;
  const btn = document.getElementById('micBtn');
  if (isPaused) {
    stopCurrentRecognition();
    btn.classList.add('on');
    btn.textContent = '⏸';
    setStatus('ready');
    setPill('');
    document.getElementById('orb').className = 'm-orb';
    document.getElementById('itxt').textContent = 'Paused — tap to resume';
    document.getElementById('mq').textContent = 'Tap mic to resume';
  } else {
    btn.classList.remove('on');
    btn.textContent = '🎤';
    startListen();
  }
}

// ══════════════════════════════════════
//  PROCESS → AI → TTS
// ══════════════════════════════════════
async function processInput(text) {
  if (!text || isProcessing) return;
  isProcessing = true;

  addBubble('u', text);
  document.getElementById('mq').textContent = 'Soch raha hoon...';
  setStatus('thinking'); setPill('thinking');
  document.getElementById('itxt').textContent = 'Processing...';
  document.getElementById('orb').className = 'm-orb thinking';

  const sys = `Tu "Elx" hai — ek smart friendly AI voice assistant. User ka naam "${uName}" hai. Tu Hinglish mein baat karta hai (natural Hindi + English mix). Sirf 1-2 chhoti sentences mein reply karo — voice ke liye. Koi markdown, asterisks, emojis ya special characters mat use karo. Bilkul plain natural speech.`;

  convHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: convHistory, systemPrompt: sys })
    });
    if (!res.ok) throw new Error(res.status);
    const { reply } = await res.json();

    convHistory.push({ role: 'assistant', content: reply });
    localStorage.setItem('elx_ctx', JSON.stringify(convHistory.slice(-24)));
    addBubble('a', reply);
    document.getElementById('mq').textContent = reply;

    if (!isMuted) await speakText(reply);
    else afterSpeak();

  } catch(e) {
    showToast('Error — API check karo');
    afterSpeak();
  }
}

// ══════════════════════════════════════
//  TTS
// ══════════════════════════════════════
async function speakText(text) {
  isSpeaking = true;
  setStatus('speaking'); setPill('speaking');
  document.getElementById('orb').className = 'm-orb speaking';
  document.getElementById('itxt').textContent = 'Elx bol raha hai...';

  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voiceId: VOICE_ID })
    });
    if (!res.ok) throw new Error('tts');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); afterSpeak(); };
    currentAudio.onerror = () => fallbackTTS(text);
    currentAudio.play();
  } catch(e) { fallbackTTS(text); }
}

function fallbackTTS(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'hi-IN'; u.rate = 0.95;
  const hv = speechSynthesis.getVoices().find(v => v.lang.startsWith('hi'));
  if (hv) u.voice = hv;
  u.onend = afterSpeak;
  speechSynthesis.speak(u);
}

function stopSpeech() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
  afterSpeak();
}

function afterSpeak() {
  isSpeaking = false;
  isProcessing = false;
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').textContent = '🎤';
  setStatus('listening');
  document.getElementById('orb').className = 'm-orb';
  // Resume listening after AI done speaking
  if (!isPaused) {
    setTimeout(startListen, 500);
  } else {
    setPill('');
    setStatus('ready');
    document.getElementById('itxt').textContent = 'Paused — tap to resume';
  }
}

// ══════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════
function setStatus(s) {
  const dot = document.getElementById('sd'), txt = document.getElementById('st');
  dot.className = 'sd';
  const m = {ready:['','Ready'],listening:['listening','Listening'],thinking:['thinking','Thinking...'],speaking:['speaking','Speaking']};
  const [c,l] = m[s]||['','Ready'];
  if(c) dot.classList.add(c); txt.textContent = l;
}

function setPill(s) {
  const p = document.getElementById('pill');
  p.className = 'i-pill'; if(s) p.classList.add(s);
}

function addBubble(role, text) {
  const area = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'cb ' + role;
  d.innerHTML = `<div class="cb-r">${role==='u'?uName:'Elx AI'}</div>${text}`;
  area.appendChild(d);
  d.scrollIntoView({behavior:'smooth',block:'nearest'});
  while(area.children.length > 12) area.removeChild(area.firstChild);
}

function loadHist() {
  convHistory.slice(-4).forEach(h => addBubble(h.role==='user'?'u':'a', h.content));
}

function toggleMute() {
  isMuted = !isMuted;
  const b = document.getElementById('muteBtn');
  b.textContent = isMuted ? '🔇' : '🔊';
  b.classList.toggle('on', isMuted);
  if (isMuted) stopSpeech();
}

function clearAll() {
  convHistory = []; localStorage.removeItem('elx_ctx');
  document.getElementById('chat').innerHTML = '';
  document.getElementById('mq').textContent = 'How can I help\nyou today?';
  showToast('Chat clear ✓');
}

function openHist() {
  const ctx = JSON.parse(localStorage.getItem('elx_ctx')||'[]');
  const list = document.getElementById('hl');
  list.innerHTML = !ctx.length
    ? '<div style="color:rgba(255,255,255,0.2);text-align:center;padding:40px;font-size:0.8rem">Koi history nahi</div>'
    : ctx.slice().reverse().map(h=>`<div class="hi ${h.role==='user'?'u':'a'}"><div class="hr">${h.role==='user'?uName:'Elx AI'}</div>${h.content}</div>`).join('');
  document.getElementById('hist').classList.add('open');
}

function closeHist() { document.getElementById('hist').classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
</body>
</html>

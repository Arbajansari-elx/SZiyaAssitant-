<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Elx Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#000;
  --blue-deep:#0a1628;
  --blue-mid:#1a4a9e;
  --blue-bright:#4a9eff;
  --blue-glow:#60b4ff;
  --blue-light:#a8d4ff;
  --text:#ffffff;
  --text-soft:rgba(255,255,255,0.65);
  --text-dim:rgba(255,255,255,0.35);
  --surface:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.1);
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;overflow:hidden;user-select:none;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,transform 0.6s ease;z-index:10;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.97);}

/* ── SCREEN 1: WELCOME ── */
#s-welcome{background:radial-gradient(ellipse 120% 80% at 50% 100%,rgba(15,40,120,0.5) 0%,transparent 65%),#000;}

.welcome-orb{
  width:110px;height:110px;
  position:relative;margin-bottom:48px;
  animation:orbFloat 4s ease-in-out infinite;
}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.orb-svg{width:110px;height:110px;}

.welcome-title{
  font-family:'Instrument Serif',serif;
  font-size:clamp(2.2rem,8vw,3rem);
  font-weight:400;
  text-align:center;
  line-height:1.15;
  margin-bottom:16px;
  background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,0.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome-sub{
  font-size:0.9rem;color:var(--text-dim);text-align:center;
  letter-spacing:0.04em;margin-bottom:56px;
  font-weight:300;
}

.get-started-btn{
  position:relative;
  padding:16px 44px;
  border-radius:100px;
  border:none;
  background:linear-gradient(135deg,rgba(74,158,255,0.9),rgba(26,74,180,0.9));
  color:#fff;
  font-family:'Figtree',sans-serif;
  font-size:1rem;font-weight:600;
  cursor:pointer;
  letter-spacing:0.03em;
  box-shadow:0 0 40px rgba(74,158,255,0.35),0 8px 32px rgba(0,0,0,0.4);
  transition:transform 0.2s,box-shadow 0.2s;
  overflow:hidden;
}
.get-started-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  border-radius:100px;
}
.get-started-btn:hover{transform:scale(1.04);box-shadow:0 0 60px rgba(74,158,255,0.5),0 8px 40px rgba(0,0,0,0.4);}
.get-started-btn:active{transform:scale(0.98);}

.welcome-brand{
  position:absolute;bottom:32px;
  font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--text-dim);font-weight:500;
}

/* ── SCREEN 2: NAME INPUT ── */
#s-name{background:radial-gradient(ellipse 100% 70% at 50% 110%,rgba(10,30,100,0.6) 0%,transparent 65%),#000;}

.name-label{
  font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:20px;font-weight:500;
}
.name-title{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.8rem,6vw,2.4rem);
  text-align:center;margin-bottom:40px;
  color:rgba(255,255,255,0.9);font-weight:400;
}

.name-input-wrap{
  position:relative;width:min(320px,85vw);margin-bottom:28px;
}
.name-input{
  width:100%;
  padding:16px 20px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(74,158,255,0.3);
  border-radius:16px;
  color:#fff;
  font-family:'Figtree',sans-serif;
  font-size:1.05rem;font-weight:400;
  outline:none;
  text-align:center;
  letter-spacing:0.05em;
  transition:border-color 0.3s,box-shadow 0.3s;
  backdrop-filter:blur(10px);
}
.name-input::placeholder{color:rgba(255,255,255,0.25);}
.name-input:focus{
  border-color:rgba(74,158,255,0.7);
  box-shadow:0 0 0 4px rgba(74,158,255,0.1),0 0 30px rgba(74,158,255,0.15);
}

.name-continue-btn{
  width:min(320px,85vw);
  padding:15px;border-radius:100px;border:none;
  background:linear-gradient(135deg,rgba(74,158,255,0.85),rgba(20,60,160,0.85));
  color:#fff;font-family:'Figtree',sans-serif;
  font-size:0.95rem;font-weight:600;cursor:pointer;
  box-shadow:0 0 30px rgba(74,158,255,0.25);
  transition:all 0.2s;opacity:0.5;pointer-events:none;
}
.name-continue-btn.ready{opacity:1;pointer-events:all;}
.name-continue-btn.ready:hover{transform:scale(1.02);box-shadow:0 0 50px rgba(74,158,255,0.4);}

/* ── SCREEN 3: ASSISTANT ── */
#s-main{
  background:radial-gradient(ellipse 140% 60% at 50% 120%,rgba(10,40,140,0.55) 0%,transparent 60%),#000;
  justify-content:flex-start;padding-top:0;
}

/* Top bar */
.top-bar{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:52px 24px 0;flex-shrink:0;
}
.top-brand{font-size:0.65rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-dim);font-weight:500;}
.status-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:100px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);
}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);transition:all 0.3s;}
.s-dot.listening{background:#4aff8c;box-shadow:0 0 8px #4aff8c;animation:pulse 1s infinite;}
.s-dot.thinking{background:#ffd04a;box-shadow:0 0 8px #ffd04a;animation:pulse 0.5s infinite;}
.s-dot.speaking{background:var(--blue-bright);box-shadow:0 0 8px var(--blue-bright);animation:pulse 0.7s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Center orb area */
.orb-area{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;
  padding-top:28px;
  gap:0;
}

.main-orb{
  width:130px;height:130px;position:relative;
  animation:orbFloat 4s ease-in-out infinite;
}
.main-orb.listening{animation:orbPulse 0.8s ease-in-out infinite;}
.main-orb.speaking{animation:orbSpeak 1s ease-in-out infinite;}
@keyframes orbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes orbSpeak{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.05) translateY(-5px)}}

.greeting-name{
  margin-top:22px;
  font-size:0.8rem;color:var(--text-dim);
  letter-spacing:0.08em;text-align:center;
  font-weight:400;
}
.main-question{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.5rem,5.5vw,2rem);
  text-align:center;
  line-height:1.25;
  color:rgba(255,255,255,0.92);
  font-weight:400;
  margin-top:8px;
  padding:0 28px;
  min-height:60px;
  transition:opacity 0.4s;
}

/* Chat area */
.chat-area{
  flex:1;width:100%;overflow-y:auto;
  padding:16px 20px 8px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:0;}

.chat-bubble{
  max-width:82%;
  padding:11px 16px;
  border-radius:18px;
  font-size:0.88rem;line-height:1.6;
  animation:bubbleIn 0.3s ease;
  font-weight:400;
}
@keyframes bubbleIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.chat-bubble.user{
  align-self:flex-end;
  background:rgba(74,158,255,0.15);
  border:1px solid rgba(74,158,255,0.25);
  color:rgba(255,255,255,0.9);
  border-bottom-right-radius:5px;
}
.chat-bubble.ai{
  align-self:flex-start;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.88);
  border-bottom-left-radius:5px;
}
.bubble-role{
  font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;
  margin-bottom:4px;font-family:'Figtree',sans-serif;font-weight:600;
  opacity:0.5;
}
.chat-bubble.user .bubble-role{color:var(--blue-bright);}
.chat-bubble.ai .bubble-role{color:rgba(255,255,255,0.5);}

/* Bottom input bar */
.bottom-bar{
  width:100%;padding:12px 16px 36px;flex-shrink:0;
}

.input-bar{
  width:100%;
  display:flex;align-items:center;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:100px;
  padding:10px 14px 10px 20px;
  gap:10px;
  backdrop-filter:blur(20px);
  transition:border-color 0.3s,box-shadow 0.3s;
  position:relative;overflow:hidden;
}
.input-bar.listening{
  border-color:rgba(74,255,140,0.4);
  box-shadow:0 0 0 3px rgba(74,255,140,0.08),0 0 30px rgba(74,255,140,0.12);
}
.input-bar.speaking{
  border-color:rgba(74,158,255,0.5);
  box-shadow:0 0 0 3px rgba(74,158,255,0.08),0 0 30px rgba(74,158,255,0.15);
}
.input-bar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(74,158,255,0.04),transparent);
  transform:translateX(-100%);
  transition:transform 0s;
}
.input-bar.thinking::before{
  animation:shimmer 1.2s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.input-text{
  flex:1;font-size:0.9rem;color:rgba(255,255,255,0.6);
  font-family:'Figtree',sans-serif;font-weight:400;
  letter-spacing:0.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Wave bars in input */
.wave-bars{
  display:flex;align-items:center;gap:3px;
  height:22px;flex-shrink:0;
}
.wb{
  width:3px;border-radius:10px;
  background:rgba(255,255,255,0.25);
  height:4px;
  transition:background 0.3s;
}
.input-bar.listening .wb{background:#4aff8c;}
.input-bar.speaking .wb{background:var(--blue-bright);}

.wb:nth-child(1){animation:wb 1s ease-in-out infinite 0s;}
.wb:nth-child(2){animation:wb 1s ease-in-out infinite 0.1s;}
.wb:nth-child(3){animation:wb 1s ease-in-out infinite 0.2s;}
.wb:nth-child(4){animation:wb 1s ease-in-out infinite 0.15s;}
.wb:nth-child(5){animation:wb 1s ease-in-out infinite 0.05s;}
@keyframes wb{0%,100%{height:4px;opacity:0.4}50%{height:18px;opacity:1}}

.mic-tap-btn{
  width:42px;height:42px;border-radius:50%;border:none;
  background:linear-gradient(135deg,rgba(74,158,255,0.8),rgba(20,60,160,0.8));
  color:#fff;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 20px rgba(74,158,255,0.25);
  transition:all 0.2s;
}
.mic-tap-btn:active{transform:scale(0.93);}
.mic-tap-btn.listening{
  background:linear-gradient(135deg,rgba(74,255,140,0.8),rgba(20,160,80,0.8));
  box-shadow:0 0 25px rgba(74,255,140,0.3);
}

.extra-btns{
  display:flex;justify-content:center;gap:16px;
  margin-top:10px;
}
.ex-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.3);font-size:0.8rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.ex-btn:hover{border-color:rgba(74,158,255,0.3);color:rgba(74,158,255,0.7);}
.ex-btn.on{border-color:rgba(74,158,255,0.4);color:var(--blue-bright);background:rgba(74,158,255,0.08);}

/* History overlay */
.overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;
  padding:48px 20px 32px;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.overlay.open{opacity:1;pointer-events:all;}
.ov-title{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-dim);margin-bottom:20px;}
.ov-close{position:absolute;top:20px;right:20px;background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.h-list{width:100%;max-width:540px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1;}
.h-list::-webkit-scrollbar{width:0;}
.h-item{padding:11px 14px;border-radius:12px;font-size:0.8rem;line-height:1.55;border:1px solid var(--border);background:var(--surface);}
.h-item .hr{font-size:0.57rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px;opacity:0.45;}
.h-item.u .hr{color:var(--blue-bright);}
.h-item.a .hr{color:rgba(255,255,255,0.5);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:100px;font-size:0.73rem;border:1px solid rgba(74,158,255,0.3);background:rgba(5,15,50,0.9);color:var(--blue-bright);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ═══ SCREEN 1: WELCOME ═══ -->
<div class="screen" id="s-welcome">
  <div class="welcome-orb">
    <svg class="orb-svg" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="og1" cx="40%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#a8d4ff" stop-opacity="0.9"/>
          <stop offset="40%" stop-color="#4a9eff" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#0a2060" stop-opacity="0.1"/>
        </radialGradient>
        <filter id="glow1">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Outer glow ring -->
      <circle cx="55" cy="55" r="52" fill="none" stroke="rgba(74,158,255,0.15)" stroke-width="1"/>
      <circle cx="55" cy="55" r="44" fill="none" stroke="rgba(74,158,255,0.1)" stroke-width="0.5"/>
      <!-- Main orb body -->
      <ellipse cx="55" cy="55" rx="38" ry="38" fill="url(#og1)" filter="url(#glow1)" opacity="0.85"/>
      <!-- Swirl highlight 1 -->
      <path d="M 38 30 Q 65 20 72 50 Q 78 75 55 82 Q 35 88 28 65 Q 22 45 38 30 Z" 
            fill="none" stroke="rgba(180,220,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Swirl highlight 2 -->
      <path d="M 45 25 Q 75 35 70 62 Q 65 85 42 80" 
            fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-linecap="round"/>
      <!-- Inner bright spot -->
      <ellipse cx="44" cy="40" rx="10" ry="8" fill="rgba(200,230,255,0.45)" filter="url(#glow1)"/>
    </svg>
  </div>

  <div class="welcome-title">Your Personal<br/>AI Assistant</div>
  <div class="welcome-sub">Powered by Elx Intelligence</div>

  <button class="get-started-btn" onclick="goToName()">Get Started</button>

  <div class="welcome-brand">Elx · Voice AI</div>
</div>

<!-- ═══ SCREEN 2: NAME ═══ -->
<div class="screen hidden" id="s-name">
  <div class="name-label">Welcome</div>
  <div class="name-title">What's your<br/>name?</div>
  <div class="name-input-wrap">
    <input class="name-input" id="nameInput" type="text" placeholder="Enter your name" autocomplete="off" spellcheck="false" oninput="onNameInput()" onkeydown="if(event.key==='Enter')goToMain()"/>
  </div>
  <button class="name-continue-btn" id="nameContinueBtn" onclick="goToMain()">Continue →</button>
</div>

<!-- ═══ SCREEN 3: MAIN ASSISTANT ═══ -->
<div class="screen hidden" id="s-main">

  <div class="top-bar">
    <div class="top-brand">Elx AI</div>
    <div class="status-chip">
      <div class="s-dot" id="sDot"></div>
      <span id="sText">Ready</span>
    </div>
  </div>

  <div class="orb-area">
    <div class="main-orb" id="mainOrb">
      <svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="mg1" cx="38%" cy="32%" r="65%">
            <stop offset="0%" stop-color="#c8e8ff" stop-opacity="0.95"/>
            <stop offset="35%" stop-color="#5aaeff" stop-opacity="0.75"/>
            <stop offset="100%" stop-color="#0a1a50" stop-opacity="0.05"/>
          </radialGradient>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="outerGlow">
            <feGaussianBlur stdDeviation="12" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Outer soft glow -->
        <circle cx="65" cy="65" r="60" fill="rgba(30,80,200,0.08)" filter="url(#outerGlow)"/>
        <circle cx="65" cy="65" r="56" fill="none" stroke="rgba(74,158,255,0.12)" stroke-width="1"/>
        <circle cx="65" cy="65" r="48" fill="none" stroke="rgba(74,158,255,0.08)" stroke-width="0.5"/>
        <!-- Orb body -->
        <ellipse cx="65" cy="65" rx="44" ry="44" fill="url(#mg1)" filter="url(#glow2)" opacity="0.9"/>
        <!-- Primary swirl -->
        <path d="M 44 35 Q 80 24 88 60 Q 94 90 65 98 Q 40 105 30 76 Q 22 50 44 35 Z" 
              fill="none" stroke="rgba(200,235,255,0.65)" stroke-width="1.8" stroke-linecap="round"/>
        <!-- Secondary swirl -->
        <path d="M 52 28 Q 90 40 84 72 Q 78 100 50 95" 
              fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Tertiary accent -->
        <path d="M 35 55 Q 28 72 40 85" 
              fill="none" stroke="rgba(160,210,255,0.4)" stroke-width="1" stroke-linecap="round"/>
        <!-- Bright core highlight -->
        <ellipse cx="52" cy="48" rx="12" ry="9" fill="rgba(220,240,255,0.5)" filter="url(#glow2)"/>
        <ellipse cx="47" cy="44" rx="5" ry="4" fill="rgba(255,255,255,0.7)"/>
      </svg>
    </div>

    <div class="greeting-name" id="greetingName">Hello</div>
    <div class="main-question" id="mainQuestion">How can I help<br/>you today?</div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="bottom-bar">
    <div class="input-bar" id="inputBar">
      <div class="input-text" id="inputText">Ask anything...</div>
      <div class="wave-bars">
        <div class="wb"></div>
        <div class="wb"></div>
        <div class="wb"></div>
        <div class="wb"></div>
        <div class="wb"></div>
      </div>
      <button class="mic-tap-btn" id="micBtn" onclick="toggleListen()">🎤</button>
    </div>
    <div class="extra-btns">
      <button class="ex-btn" id="muteBtn" onclick="toggleMute()" title="Mute">🔊</button>
      <button class="ex-btn" onclick="openHistory()" title="History">📋</button>
      <button class="ex-btn" onclick="clearAll()" title="Clear">🗑️</button>
    </div>
  </div>
</div>

<!-- History -->
<div class="overlay" id="histOver">
  <div class="ov-title">Conversation History</div>
  <button class="ov-close" onclick="closeHistory()">✕</button>
  <div class="h-list" id="hList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════
let userName = localStorage.getItem('elx_name') || '';

function goToName() {
  show('s-welcome', false);
  show('s-name', true);
  setTimeout(() => document.getElementById('nameInput').focus(), 400);
}

function onNameInput() {
  const v = document.getElementById('nameInput').value.trim();
  document.getElementById('nameContinueBtn').classList.toggle('ready', v.length > 0);
}

function goToMain() {
  const v = document.getElementById('nameInput').value.trim();
  if (!v) return;
  userName = v;
  localStorage.setItem('elx_name', userName);
  show('s-name', false);
  show('s-main', true);
  initMain();
}

function show(id, visible) {
  const el = document.getElementById(id);
  if (visible) el.classList.remove('hidden');
  else el.classList.add('hidden');
}

// Auto-skip welcome if name saved
window.addEventListener('load', () => {
  if (userName) {
    show('s-welcome', false);
    show('s-main', true);
    initMain();
  }
});

function initMain() {
  document.getElementById('greetingName').textContent = 'Hello ' + userName;
  loadHistory();
}

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
let isListening = false;
let isMuted = false;
let isSpeaking = false;
let recognition = null;
let silenceTimer = null;
let convHistory = JSON.parse(localStorage.getItem('elx_ctx') || '[]').slice(-14);
let currentAudio = null;

const VOICE_ID = '21m00Tcm4TlvDq8ikWAM';
const SYS = `Tu "Elx" hai — ek smart friendly AI voice assistant. User ka naam ${() => userName} hai. Tu Hinglish mein baat karta hai (natural Hindi + English mix). Voice ke liye sirf 1-2 chhoti sentences mein reply karo. Koi markdown, asterisks, emojis ya special characters mat use karo. Ekdum plain natural speech jaisa likho.`;

// ═══════════════════════════════════
//  AUTO-LISTEN ENGINE
// ═══════════════════════════════════
function toggleListen() {
  if (isSpeaking) { stopSpeech(); return; }
  if (isListening) { stopListen(); return; }
  startListen();
}

function startListen() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Chrome use karo bhai'); return; }

  recognition = new SR();
  recognition.lang = 'hi-IN';
  recognition.continuous = true;       // continuous listen
  recognition.interimResults = true;

  let finalText = '';
  let interimText = '';

  recognition.onstart = () => {
    isListening = true;
    setStatus('listening');
    setInputBar('listening');
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('mainOrb').className = 'main-orb listening';
    document.getElementById('mainQuestion').textContent = 'Sun raha hoon...';
    document.getElementById('inputText').textContent = 'Bol raha hoon...';
    finalText = ''; interimText = '';
  };

  recognition.onresult = (e) => {
    interimText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interimText += e.results[i][0].transcript;
    }
    document.getElementById('inputText').textContent = interimText || finalText || 'Bol raha hoon...';

    // Auto-send after silence (1.8s after last result)
    clearTimeout(silenceTimer);
    if (finalText.trim()) {
      silenceTimer = setTimeout(() => {
        if (finalText.trim()) {
          const text = finalText.trim();
          finalText = '';
          stopListen();
          processInput(text);
        }
      }, 1800);
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') showToast('Mic error: ' + e.error);
    stopListen();
  };

  recognition.onend = () => {
    // Restart if still supposed to be listening
    if (isListening) {
      try { recognition.start(); } catch(e) { stopListen(); }
    }
  };

  try { recognition.start(); }
  catch(e) { showToast('Mic permission do'); }
}

function stopListen() {
  isListening = false;
  clearTimeout(silenceTimer);
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎤';
  setInputBar('');
  document.getElementById('inputText').textContent = 'Ask anything...';
  if (!isSpeaking) {
    setStatus('ready');
    document.getElementById('mainOrb').className = 'main-orb';
    document.getElementById('mainQuestion').textContent = 'How can I help\nyou today?';
  }
}

// ═══════════════════════════════════
//  PROCESS → GROQ → TTS
// ═══════════════════════════════════
async function processInput(text) {
  if (!text) return;

  addBubble('user', text);
  document.getElementById('mainQuestion').textContent = 'Soch raha hoon...';
  setStatus('thinking');
  setInputBar('thinking');
  document.getElementById('inputText').textContent = 'Processing...';
  document.getElementById('mainOrb').className = 'main-orb';

  const sysWithName = `Tu "Elx" hai — ek smart friendly AI voice assistant. User ka naam "${userName}" hai. Tu Hinglish mein baat karta hai (natural Hindi + English mix). Voice ke liye sirf 1-2 chhoti sentences mein reply karo. Koi markdown, asterisks, emojis ya special characters mat use karo. Ekdum plain natural speech jaisa likho.`;

  convHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: convHistory, systemPrompt: sysWithName })
    });
    if (!res.ok) throw new Error(res.status);
    const { reply } = await res.json();

    convHistory.push({ role: 'assistant', content: reply });
    localStorage.setItem('elx_ctx', JSON.stringify(convHistory.slice(-24)));

    addBubble('ai', reply);
    document.getElementById('mainQuestion').textContent = reply;

    if (!isMuted) await speakText(reply);
    else doneState();

  } catch(e) {
    showToast('Error — API check karo');
    doneState();
  }
}

// ═══════════════════════════════════
//  TTS
// ═══════════════════════════════════
async function speakText(text) {
  isSpeaking = true;
  setStatus('speaking');
  setInputBar('speaking');
  document.getElementById('mainOrb').className = 'main-orb speaking';
  document.getElementById('micBtn').textContent = '⏹';
  document.getElementById('inputText').textContent = 'Elx bol raha hai...';

  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voiceId: VOICE_ID })
    });
    if (!res.ok) throw new Error('tts');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); doneState(); };
    currentAudio.onerror = () => fallbackTTS(text);
    currentAudio.play();
  } catch(e) { fallbackTTS(text); }
}

function fallbackTTS(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'hi-IN'; u.rate = 0.95;
  const hv = speechSynthesis.getVoices().find(v => v.lang.startsWith('hi'));
  if (hv) u.voice = hv;
  u.onend = doneState;
  speechSynthesis.speak(u);
}

function stopSpeech() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
  doneState();
}

function doneState() {
  isSpeaking = false;
  document.getElementById('micBtn').textContent = '🎤';
  setInputBar('');
  document.getElementById('inputText').textContent = 'Ask anything...';
  setStatus('ready');
  document.getElementById('mainOrb').className = 'main-orb';
}

// ═══════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════
function setStatus(s) {
  const dot = document.getElementById('sDot');
  const txt = document.getElementById('sText');
  dot.className = 's-dot';
  const m = { ready:['','Ready'], listening:['listening','Listening'], thinking:['thinking','Thinking...'], speaking:['speaking','Speaking'] };
  const [c,l] = m[s]||['','Ready'];
  if(c) dot.classList.add(c);
  txt.textContent = l;
}

function setInputBar(state) {
  const bar = document.getElementById('inputBar');
  bar.className = 'input-bar';
  if (state) bar.classList.add(state);
}

function addBubble(role, text) {
  const area = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = 'chat-bubble ' + role;
  d.innerHTML = `<div class="bubble-role">${role === 'user' ? userName : 'Elx AI'}</div>${text}`;
  area.appendChild(d);
  d.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  // Keep max 10 bubbles
  while (area.children.length > 10) area.removeChild(area.firstChild);
}

function loadHistory() {
  const last = convHistory.slice(-4);
  last.forEach(h => addBubble(h.role === 'user' ? 'user' : 'ai', h.content));
}

function toggleMute() {
  isMuted = !isMuted;
  const b = document.getElementById('muteBtn');
  b.textContent = isMuted ? '🔇' : '🔊';
  b.classList.toggle('on', isMuted);
  if (isMuted) stopSpeech();
}

function clearAll() {
  convHistory = [];
  localStorage.removeItem('elx_ctx');
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('mainQuestion').textContent = 'How can I help\nyou today?';
  showToast('Chat clear ✓');
}

function openHistory() {
  const ctx = JSON.parse(localStorage.getItem('elx_ctx') || '[]');
  const list = document.getElementById('hList');
  list.innerHTML = !ctx.length
    ? '<div style="color:rgba(255,255,255,0.25);text-align:center;padding:40px;font-size:0.8rem">Koi history nahi abhi</div>'
    : ctx.slice().reverse().map(h=>`<div class="h-item ${h.role==='user'?'u':'a'}"><div class="hr">${h.role==='user'?userName:'Elx AI'}</div>${h.content}</div>`).join('');
  document.getElementById('histOver').classList.add('open');
}

function closeHistory() { document.getElementById('histOver').classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>

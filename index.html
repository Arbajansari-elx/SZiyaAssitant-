<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elx Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;600;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #05050f;
    --blue1: #4a9eff;
    --blue2: #1a5fd4;
    --text: #ddeeff;
    --muted: rgba(180,210,255,0.35);
    --surface: rgba(255,255,255,0.03);
    --border: rgba(74,158,255,0.12);
  }
  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; user-select:none; }

  .bg-grad {
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 80% 55% at 50% 105%, rgba(10,30,110,0.65) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 50% 115%, rgba(26,95,212,0.2) 0%, transparent 60%);
  }

  .app {
    position:relative; z-index:1;
    width:100vw; height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:32px 0 0;
  }

  /* Header */
  header {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; padding:0 28px;
  }
  .logo { font-family:'Syne',sans-serif; font-weight:700; font-size:0.72rem; letter-spacing:0.32em; text-transform:uppercase; color:rgba(74,158,255,0.55); }
  .status-pill { display:flex; align-items:center; gap:7px; font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); font-family:'Syne',sans-serif; }
  .s-dot { width:5px; height:5px; border-radius:50%; background:var(--muted); transition:background 0.4s,box-shadow 0.4s; }
  .s-dot.on { background:var(--blue1); box-shadow:0 0 8px var(--blue1); animation:sdot 1.2s ease-in-out infinite; }
  @keyframes sdot { 0%,100%{opacity:1}50%{opacity:0.3} }

  /* Center */
  .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; gap:0; padding:0 28px; }

  .greeting {
    font-family:'DM Sans',sans-serif; font-weight:300;
    font-size:clamp(1.05rem,2.8vw,1.45rem);
    color:rgba(180,210,255,0.72);
    letter-spacing:0.04em; text-align:center;
    min-height:36px;
    transition:opacity 0.4s;
  }
  .transcript-box { margin-top:20px; width:100%; max-width:600px; display:flex; flex-direction:column; align-items:center; gap:9px; }
  .user-line { font-size:0.82rem; color:rgba(140,180,255,0.5); font-style:italic; text-align:center; min-height:18px; }
  .ai-line { font-size:clamp(0.92rem,2.3vw,1.05rem); color:var(--text); font-weight:300; text-align:center; line-height:1.68; min-height:26px; }

  /* Wave canvas */
  .wave-wrap { width:100%; position:relative; height:195px; flex-shrink:0; }
  canvas#wc { width:100%; height:195px; display:block; }

  /* Controls */
  .controls { width:100%; padding:16px 28px 38px; display:flex; flex-direction:column; align-items:center; gap:16px; }

  .mic-outer {
    position:relative; width:68px; height:68px;
    display:flex; align-items:center; justify-content:center;
  }
  .ripple {
    position:absolute; border-radius:50%;
    border:1px solid rgba(74,158,255,0);
    width:100%; height:100%;
    pointer-events:none;
  }
  .ripple.r1 { animation:rp 2.4s ease-out infinite; }
  .ripple.r2 { animation:rp 2.4s ease-out infinite 1.2s; }
  .mic-outer.pulse .ripple { border-color:rgba(74,158,255,0.5); animation-duration:1.4s; }
  @keyframes rp { 0%{transform:scale(1);opacity:0.7} 100%{transform:scale(2.3);opacity:0} }

  .mic-btn {
    width:60px; height:60px; border-radius:50%;
    border:1.5px solid rgba(74,158,255,0.38);
    background:rgba(8,20,60,0.65);
    backdrop-filter:blur(10px);
    cursor:pointer; font-size:1.45rem;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 0 18px rgba(74,158,255,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
    position:relative; z-index:1;
  }
  .mic-btn:hover { transform:scale(1.07); border-color:rgba(74,158,255,0.65); box-shadow:0 0 28px rgba(74,158,255,0.22); }
  .mic-btn.listening { background:rgba(20,55,140,0.8); border-color:var(--blue1); box-shadow:0 0 38px rgba(74,158,255,0.38),0 0 70px rgba(74,158,255,0.12); transform:scale(1.1); }
  .mic-btn.speaking { background:rgba(10,30,90,0.7); border-color:rgba(74,158,255,0.55); box-shadow:0 0 28px rgba(74,158,255,0.18); }

  .hint { font-size:0.62rem; letter-spacing:0.24em; text-transform:uppercase; color:var(--muted); font-family:'Syne',sans-serif; transition:color 0.3s; }

  .btm-row { display:flex; gap:12px; }
  .icon-btn {
    width:36px; height:36px; border-radius:50%;
    border:1px solid var(--border); background:var(--surface);
    color:var(--muted); cursor:pointer; font-size:0.88rem;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  .icon-btn:hover { border-color:rgba(74,158,255,0.38); color:var(--blue1); }
  .icon-btn.on { border-color:rgba(74,158,255,0.5); color:var(--blue1); background:rgba(74,158,255,0.06); }

  /* History overlay */
  .overlay {
    position:fixed; inset:0; z-index:50;
    background:rgba(4,4,14,0.93); backdrop-filter:blur(18px);
    display:flex; flex-direction:column; align-items:center; padding:40px 22px;
    opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .overlay.open { opacity:1; pointer-events:all; }
  .ov-title { font-family:'Syne',sans-serif; font-weight:600; font-size:0.68rem; letter-spacing:0.28em; text-transform:uppercase; color:rgba(74,158,255,0.55); margin-bottom:22px; }
  .ov-close { position:absolute; top:22px; right:22px; background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; border-radius:50%; width:34px; height:34px; font-size:0.95rem; display:flex; align-items:center; justify-content:center; }
  .h-list { width:100%; max-width:560px; overflow-y:auto; display:flex; flex-direction:column; gap:9px; flex:1; }
  .h-list::-webkit-scrollbar { width:3px; }
  .h-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .h-item { padding:11px 15px; border-radius:11px; font-size:0.8rem; line-height:1.6; border:1px solid var(--border); background:var(--surface); }
  .h-item .hr { font-size:0.57rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:4px; font-family:'Syne',sans-serif; }
  .h-item.u .hr { color:rgba(74,158,255,0.6); }
  .h-item.a .hr { color:rgba(180,210,255,0.45); }

  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); padding:9px 20px; border-radius:100px; font-size:0.73rem; border:1px solid rgba(74,158,255,0.3); background:rgba(8,20,70,0.85); color:var(--blue1); opacity:0; transition:opacity 0.3s; pointer-events:none; letter-spacing:0.04em; z-index:99; white-space:nowrap; }
  .toast.show { opacity:1; }

  @media(max-width:480px) { .wave-wrap,canvas#wc { height:160px; } }
</style>
</head>
<body>
<div class="bg-grad"></div>

<div class="app">
  <header>
    <div class="logo">Elx · Voice AI</div>
    <div class="status-pill">
      <div class="s-dot" id="sDot"></div>
      <span id="sText">Ready</span>
    </div>
  </header>

  <div class="center">
    <div class="greeting" id="greeting">What can I help you with?</div>
    <div class="transcript-box">
      <div class="user-line" id="userLine"></div>
      <div class="ai-line" id="aiLine"></div>
    </div>
  </div>

  <div class="wave-wrap">
    <canvas id="wc"></canvas>
  </div>

  <div class="controls">
    <div class="mic-outer" id="micOuter">
      <div class="ripple r1"></div>
      <div class="ripple r2"></div>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    </div>
    <div class="hint" id="hint">Tap to speak</div>
    <div class="btm-row">
      <button class="icon-btn" id="muteBtn" onclick="toggleMute()" title="Mute">🔊</button>
      <button class="icon-btn" onclick="openHistory()" title="History">📋</button>
      <button class="icon-btn" onclick="clearAll()" title="Clear">🗑️</button>
    </div>
  </div>
</div>

<div class="overlay" id="histOver">
  <div class="ov-title">Conversation History</div>
  <button class="ov-close" onclick="closeHistory()">✕</button>
  <div class="h-list" id="hList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//   WAVE ENGINE — Siri-style canvas waves
// ═══════════════════════════════════════════════
const canvas = document.getElementById('wc');
const ctx2d = canvas.getContext('2d');

let waveIntensity = 0;
let targetIntensity = 0;

// Wave layers: each has own freq, amp, speed, phase offset
const LAYERS = [
  { f:0.0075, a:42, spd:0.020, ph:0,    al:0.92, lw:2.4 },
  { f:0.0115, a:30, spd:0.032, ph:2.0,  al:0.55, lw:1.7 },
  { f:0.0058, a:22, spd:0.016, ph:4.5,  al:0.32, lw:1.3 },
  { f:0.0195, a:14, spd:0.044, ph:1.1,  al:0.22, lw:0.9 },
  { f:0.0090, a:18, spd:0.027, ph:3.3,  al:0.18, lw:1.0 },
];

function resizeWave() {
  const dpr = window.devicePixelRatio || 1;
  const el = canvas.parentElement;
  const W = el.offsetWidth;
  const H = el.offsetHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeWave();
window.addEventListener('resize', resizeWave);

function drawFrame() {
  const W = canvas.width / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  ctx2d.clearRect(0, 0, W, H);

  // Ease intensity
  waveIntensity += (targetIntensity - waveIntensity) * 0.055;

  const cx = W / 2;
  const cy = H * 0.52;
  const spread = W * 0.88;
  const half = spread / 2;

  LAYERS.forEach(layer => {
    layer.ph += layer.spd;

    const amp = layer.a * waveIntensity;

    ctx2d.beginPath();
    let first = true;
    for (let px = cx - half; px <= cx + half; px += 1.8) {
      const t  = (px - cx) / half;             // -1 to 1
      // Envelope: smooth fade at edges, peak in center
      const env = Math.pow(Math.max(0, 1 - t * t), 1.6);

      const y = cy
        + Math.sin(px * layer.f + layer.ph) * amp * env
        + Math.sin(px * layer.f * 1.6 + layer.ph * 0.75) * amp * 0.28 * env;

      first ? ctx2d.moveTo(px, y) : ctx2d.lineTo(px, y);
      first = false;
    }

    // Blue gradient matching photo
    const vis = Math.min(1, waveIntensity * 1.6 + 0.06);
    const a   = layer.al * vis;
    const grd = ctx2d.createLinearGradient(cx - half, 0, cx + half, 0);
    grd.addColorStop(0,    `rgba(8,25,120,0)`);
    grd.addColorStop(0.18, `rgba(22,80,200,${a * 0.45})`);
    grd.addColorStop(0.42, `rgba(60,145,255,${a})`);
    grd.addColorStop(0.58, `rgba(80,170,255,${a})`);
    grd.addColorStop(0.82, `rgba(22,80,200,${a * 0.45})`);
    grd.addColorStop(1,    `rgba(8,25,120,0)`);

    ctx2d.strokeStyle = grd;
    ctx2d.lineWidth   = layer.lw + waveIntensity * 0.9;
    ctx2d.shadowColor = `rgba(60,145,255,${0.45 * waveIntensity})`;
    ctx2d.shadowBlur  = 14 * waveIntensity;
    ctx2d.stroke();
    ctx2d.shadowBlur  = 0;
  });

  // Static base line (barely visible at rest)
  const baseA = 0.07 + (1 - waveIntensity) * 0.06;
  const bg = ctx2d.createLinearGradient(cx - half, 0, cx + half, 0);
  bg.addColorStop(0, 'transparent');
  bg.addColorStop(0.25, `rgba(74,158,255,${baseA})`);
  bg.addColorStop(0.75, `rgba(74,158,255,${baseA})`);
  bg.addColorStop(1, 'transparent');
  ctx2d.beginPath();
  ctx2d.moveTo(cx - half, cy);
  ctx2d.lineTo(cx + half, cy);
  ctx2d.strokeStyle = bg;
  ctx2d.lineWidth   = 0.7;
  ctx2d.stroke();

  requestAnimationFrame(drawFrame);
}
drawFrame();

// ═══════════════════════════════════════════════
//   APP STATE
// ═══════════════════════════════════════════════
let isListening = false;
let isMuted = false;
let recognition = null;
let convHistory = [];
let currentAudio = null;
let isSpeaking = false;

const VOICE_ID = '21m00Tcm4TlvDq8ikWAM';  // ElevenLabs Rachel

const SYS_PROMPT = `Tu "Elx" hai — ek smart aur friendly AI voice assistant. Tu Hinglish mein baat karta hai (Hindi + English natural mix). Voice ke liye reply karo — sirf 1-2 chhoti sentences. Koi markdown, emojis ya formatting mat use karo. Plain text only.`;

// Restore last session
convHistory = JSON.parse(localStorage.getItem('elx_ctx') || '[]').slice(-12);

// ── Speech Recognition ──────────────────────────────────────────
function makeRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Chrome use karo — speech API nahi hai'); return null; }
  const r = new SR();
  r.lang = 'hi-IN';
  r.continuous = false;
  r.interimResults = true;

  r.onstart = () => {
    setStatus('listening');
    setGreeting('Sun raha hoon...');
    document.getElementById('userLine').textContent = '';
    targetIntensity = 0.9;
  };

  r.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      (e.results[i].isFinal ? (final += e.results[i][0].transcript) : (interim += e.results[i][0].transcript));
    }
    document.getElementById('userLine').textContent = interim || final;
    if (final) handleInput(final.trim());
  };

  r.onerror = e => { if (e.error !== 'no-speech') showToast('Mic error: ' + e.error); stopListen(); };
  r.onend = stopListen;
  return r;
}

function toggleMic() {
  if (isSpeaking) { stopSpeech(); return; }
  if (isListening) { stopListen(); return; }
  startListen();
}

function startListen() {
  recognition = makeRec();
  if (!recognition) return;
  try {
    recognition.start();
    isListening = true;
    const btn = document.getElementById('micBtn');
    btn.classList.add('listening');
    btn.textContent = '⏹';
    document.getElementById('micOuter').classList.add('pulse');
    document.getElementById('hint').textContent = 'Listening... (tap to stop)';
  } catch(e) { showToast('Mic permission do'); }
}

function stopListen() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  const btn = document.getElementById('micBtn');
  btn.classList.remove('listening');
  btn.textContent = '🎤';
  document.getElementById('micOuter').classList.remove('pulse');
  if (!isSpeaking) {
    targetIntensity = 0;
    setStatus('ready');
    document.getElementById('hint').textContent = 'Tap to speak';
  }
}

// ── Handle Input ────────────────────────────────────────────────
async function handleInput(text) {
  if (!text) return;
  document.getElementById('userLine').textContent = text;
  document.getElementById('aiLine').textContent = '';
  setGreeting('Soch raha hoon...');
  setStatus('thinking');
  targetIntensity = 0.28;

  convHistory.push({ role:'user', content:text });

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages: convHistory, systemPrompt: SYS_PROMPT })
    });
    if (!res.ok) throw new Error(res.status);

    const { reply } = await res.json();
    convHistory.push({ role:'assistant', content:reply });
    localStorage.setItem('elx_ctx', JSON.stringify(convHistory.slice(-24)));

    document.getElementById('aiLine').textContent = reply;
    setGreeting('');

    if (!isMuted) await speakText(reply);
    else doneState();

  } catch(e) {
    showToast('Error — Groq API key Vercel mein check karo');
    doneState();
    setGreeting('What can I help you with?');
  }
}

// ── TTS via Vercel /api/tts ─────────────────────────────────────
async function speakText(text) {
  setStatus('speaking');
  isSpeaking = true;
  targetIntensity = 1.0;
  const btn = document.getElementById('micBtn');
  btn.classList.add('speaking');
  btn.textContent = '⏹';
  document.getElementById('hint').textContent = 'Tap to stop';

  try {
    const res = await fetch('/api/tts', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, voiceId: VOICE_ID })
    });
    if (!res.ok) throw new Error('tts');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); doneState(); };
    currentAudio.onerror = () => fallbackTTS(text);
    currentAudio.play();
  } catch(e) { fallbackTTS(text); }
}

function fallbackTTS(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'hi-IN'; u.rate = 0.95;
  const hv = speechSynthesis.getVoices().find(v => v.lang.startsWith('hi'));
  if (hv) u.voice = hv;
  u.onend = doneState;
  speechSynthesis.speak(u);
}

function stopSpeech() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
  doneState();
}

function doneState() {
  isSpeaking = false;
  targetIntensity = 0;
  const btn = document.getElementById('micBtn');
  btn.classList.remove('speaking');
  btn.textContent = '🎤';
  document.getElementById('hint').textContent = 'Tap to speak';
  setStatus('ready');
  if (!document.getElementById('aiLine').textContent)
    setGreeting('What can I help you with?');
}

// ── UI Helpers ──────────────────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById('sDot');
  const txt = document.getElementById('sText');
  dot.className = 's-dot';
  const m = { ready:['','Ready'], listening:['on','Listening'], thinking:['on','Thinking...'], speaking:['on','Speaking'] };
  const [c,l] = m[s]||['','Ready'];
  if(c) dot.classList.add(c);
  txt.textContent = l;
}
function setGreeting(t) { document.getElementById('greeting').textContent = t; }
function toggleMute() {
  isMuted = !isMuted;
  const b = document.getElementById('muteBtn');
  b.textContent = isMuted ? '🔇' : '🔊';
  b.classList.toggle('on', isMuted);
  if (isMuted) stopSpeech();
}
function clearAll() {
  convHistory = [];
  localStorage.removeItem('elx_ctx');
  document.getElementById('userLine').textContent = '';
  document.getElementById('aiLine').textContent = '';
  setGreeting('What can I help you with?');
  showToast('Chat clear ✓');
}
function openHistory() {
  const ctx = JSON.parse(localStorage.getItem('elx_ctx') || '[]');
  const list = document.getElementById('hList');
  list.innerHTML = !ctx.length
    ? '<div style="color:var(--muted);text-align:center;padding:40px;font-size:0.8rem">Koi history nahi abhi</div>'
    : ctx.slice().reverse().map(h=>`<div class="h-item ${h.role==='user'?'u':'a'}"><div class="hr">${h.role==='user'?'Aap':'Elx AI'}</div>${h.content}</div>`).join('');
  document.getElementById('histOver').classList.add('open');
}
function closeHistory() { document.getElementById('histOver').classList.remove('open'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
